<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0A4D3C;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1E735D;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradLightGreen" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#4EBA7C;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2A8F54;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradGold" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#C59B27;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#E5C158;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#A37C1B;stop-opacity:1" />
        </linearGradient>
        
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>

    <circle cx="256" cy="256" r="230" fill="none" stroke="url(#gradGreen)" stroke-width="8" />
    
    <circle cx="256" cy="18" r="12" fill="url(#gradGold)" />
    <circle cx="494" cy="256" r="12" fill="url(#gradGold)" />
    <circle cx="256" cy="494" r="12" fill="url(#gradGold)" />
    <circle cx="18" cy="256" r="12" fill="url(#gradGold)" />
    
    <circle cx="256" cy="256" r="200" fill="none" stroke="#2A8F54" stroke-width="3" stroke-dasharray="10,8" opacity="0.6" />

    <circle cx="256" cy="256" r="175" fill="#FFFFFF" filter="url(#shadow)" />
    <circle cx="256" cy="256" r="175" fill="none" stroke="url(#gradLightGreen)" stroke-width="2" opacity="0.3" />

    <g transform="translate(256, 265)">
        <path d="M 0,-110 C 45,-60 85,-20 85,30 C 85,80 40,110 0,110 C -40,110 -85,80 -85,30 C -85,-20 -45,-60 0,-110 Z" fill="url(#gradGreen)" />
              
        <path d="M 0,-90 C 35,-50 65,-15 65,25 C 65,65 30,90 0,90 C -30,90 -65,65 -65,25 C -65,-15 -35,-50 0,-90 Z" fill="url(#gradLightGreen)" />
              
        <path d="M 0,-50 C 15,-25 30,-5 30,15 C 30,35 15,50 0,50 C -15,50 -30,35 -30,15 C -30,-5 -15,-25 0,-50 Z" fill="url(#gradGold)" />
              
        <path d="M 0,90 L 0,-20" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.7" />
        <path d="M 0,50 L 30,25" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7" />
        <path d="M 0,30 L -30,5" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7" />
        <path d="M 0,10 L 25,-10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    </g>

    <path d="M 130,160 A 40,40 0 0,1 160,130" fill="none" stroke="url(#gradGold)" stroke-width="5" stroke-linecap="round" />
    <path d="M 115,160 A 60,60 0 0,1 160,115" fill="none" stroke="url(#gradGreen)" stroke-width="4" stroke-linecap="round" stroke-dasharray="4,4" />
    
    <path d="M 382,160 A 40,40 0 0,0 352,130" fill="none" stroke="url(#gradGold)" stroke-width="5" stroke-linecap="round" />
    <path d="M 397,160 A 60,60 0 0,0 352,115" fill="none" stroke="url(#gradGreen)" stroke-width="4" stroke-linecap="round" stroke-dasharray="4,4" />
</svg>
